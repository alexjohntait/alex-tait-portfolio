<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Alex Tait — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Avenue Mono';
      src: url('path-to-your-font/AvenueMono.woff2') format('woff2');
      font-weight: normal; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; touch-action: none; background: #fff; }
    img, video { display: block; max-width: none; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    :root {
      --ff: 'Geist', system-ui, sans-serif;
      --ff-feature: 'Avenue Mono', 'Geist Mono', monospace; 
      --silk: cubic-bezier(.22, 1, .36, 1);
      --bg: #FFFFFF;
      --ink: #000000;
      --strip-h: 35vh; /* INCREASED 20% */
      --header-h: 80px;
    }

    body {
      display: flex; flex-direction: column; height: 100vh;
      font-family: var(--ff); color: var(--ink);
      transition: background-color 0.8s var(--silk);
    }
    body.is-dark { --ink: #FFFFFF; }

    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png");
      opacity: 0.04; pointer-events: none; z-index: 999; animation: grain 8s steps(10) infinite;
    }

    .main { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; position: relative; }

    /* ══ TOP BAR ══════════════════════════ */
    .top-bar {
      flex-shrink: 0; height: var(--header-h); display: flex;
      align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100;
    }
    .top-left { display: flex; align-items: center; gap: 40px; }
    .top-name { font-family: var(--ff-feature); font-size: 1.1rem; letter-spacing: -0.01em; color: var(--ink); }
    .top-cats { display: flex; gap: 16px; font-family: var(--ff-feature); font-size: 0.75rem; }
    .top-cat { cursor: pointer; opacity: 0.3; transition: opacity .3s; color: var(--ink); }
    .top-cat.active { opacity: 1; }
    .top-contact-btn { font-size: 0.85rem; font-weight: 600; border-bottom: 1.5px solid var(--ink); padding-bottom: 2px; cursor: pointer; }
    .info-trigger { display: none; font-family: var(--ff-feature); font-size: 0.75rem; border: 1.2px solid var(--ink); padding: 6px 14px; border-radius: 20px; }

    /* ══ MAIN CAROUSEL ════════════════════ */
    .middle-area { flex: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; }
    
    .meta-container {
      width: 100%; text-align: center; margin-bottom: 100px; /* MOVED UP TO ACCOMMODATE BIGGER CAROUSEL */
      font-family: var(--ff-feature); line-height: 1.4; pointer-events: none;
    }
    .meta-title { font-size: 1.4rem; text-transform: lowercase; margin: 0; }
    .meta-sub { font-size: 0.75rem; opacity: 0.8; text-transform: lowercase; margin-top: 4px; }

    .strip-outer { width: 100%; height: var(--strip-h); position: relative; overflow: visible; }
    .strip { display: flex; height: 100%; transition: transform 0.6s var(--silk); will-change: transform; gap: 0px; }
    .strip-item-wrap { flex-shrink: 0; height: 100%; cursor: pointer; position: relative; padding: 0; opacity: 1; }
    .strip-item-wrap.active { z-index: 10 !important; }
    .strip-media { height: 100%; width: auto; object-fit: contain; transition: transform 0.6s var(--silk); transform-origin: center; }
    @media (min-width: 769px) { .strip-item-wrap.active .strip-media { transform: scale(1.2); } }

    /* ══ BOTTOM AREA (RESTORED CONTACT INFO) ════ */
    .bottom-area { flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 32px 40px; min-height: 20vh; z-index: 10; }
