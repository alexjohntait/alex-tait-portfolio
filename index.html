<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Alex Tait — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Avenue Mono';
      src: url('path-to-your-font/AvenueMono.woff2') format('woff2');
      font-weight: normal; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; touch-action: none; }
    img, video { display: block; max-width: none; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    :root {
      --ff: 'Geist', system-ui, sans-serif;
      --ff-feature: 'Avenue Mono', 'Geist Mono', monospace; 
      --silk: cubic-bezier(.22, 1, .36, 1);
      --bg: #FFFFFF;
      --ink: #000000;
      --strip-h: 37vh; 
      --header-h: 80px;
      --gap: 0px; /* ELIMINATED GAPS */
    }

    body {
      display: flex; flex-direction: column; height: 100vh;
      font-family: var(--ff); background: var(--bg); color: var(--ink);
      transition: background-color 0.8s var(--silk), color 0.8s var(--silk);
    }
    body.is-dark { --ink: #FFFFFF; }

    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png");
      opacity: 0.04; pointer-events: none; z-index: 999; animation: grain 8s steps(10) infinite;
    }
    @keyframes grain { 0%, 100% { transform:translate(0, 0) } 50% { transform:translate(-5%, -10%) } }

    .main { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; position: relative; }

    /* ══ TOP BAR ══════════════════════════ */
    .top-bar {
      flex-shrink: 0; height: var(--header-h); display: flex;
      align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100;
    }
    .top-name { font-family: var(--ff-feature); font-size: 1rem; letter-spacing: -0.01em; }
    .top-right { display: flex; align-items: center; gap: 24px; }
    .top-contact { font-size: 0.8rem; font-weight: 600; border-bottom: 1.5px solid var(--ink); padding-bottom: 2px; }
    .info-trigger { display: none; font-family: var(--ff-feature); font-size: 0.7rem; border: 1px solid var(--ink); padding: 5px 12px; border-radius: 20px; }

    /* ══ CAROUSEL ═════════════════════════ */
    .middle-area { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: visible; width: 100%; }
    .strip-outer { width: 100%; height: var(--strip-h); position: relative; overflow: visible; }
    .strip { display: flex; height: 100%; transition: transform 0.6s var(--silk); will-change: transform; overflow: visible; gap: var(--gap); }
    
    .strip-item-wrap { flex-shrink: 0; height: 100%; cursor: pointer; position: relative; z-index: 1; transition: opacity 0.4s; padding: 0; }
    .strip-item-wrap:not(.active) { opacity: 0.3; }
    .strip-item-wrap.active { z-index: 100 !important; opacity: 1; }

    /* Technical labels above images */
    .strip-meta { 
      position: absolute; top: -80px; left: 0; font-family: var(--ff-feature); font-size: 0.9rem; /* LARGER TYPE */
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; line-height: 1.4;
    }
    .strip-item-wrap.active .strip-meta { opacity: 0.7; }
    .meta-detail { opacity: 0.6; font-size: 0.65rem; text-transform: lowercase; margin-top: 4px; }

    .strip-img-wrap { height: 100%; position: relative; overflow: visible; }
    .strip-img { height: 100%; width: auto; object-fit: contain; transition: transform 0.6s var(--silk); transform-origin: center center; }
    @media (min-width: 769px) { .strip-item-wrap.active .strip-img { transform: scale(1.4); } }

    /* ══ BOTTOM AREA ══════════════════════ */
    .bottom-area { flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 32px 40px; min-height: 20vh; z-index: 10; }
    .about-cols { display: flex; align-items: flex-end; gap: 100px; }
    .about-text { font-size: 26pt; line-height: 1.1; letter-spacing: -0.02em; font-weight: 500; max-width: 32ch; transition: color 0.8s, transform 0.6s var(--silk), font-size 0.6s var(--silk); transform-origin: bottom left; }
    
    .about-info-col { display: flex; flex-direction: column; gap: 15px; font-family: var(--ff-feature); font-size: 0.8rem; }
    .about-link { border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 2px; }
    .label { opacity: 0.4; font-size: 0.6rem; text-transform: lowercase; margin-bottom: 4px; }
    .bottom-logo { width: 110px; height: 110px; flex-shrink: 0; }
    .bottom-logo img { width: 100%; height: 100%; object-fit: contain; }

    /* ══ MOBILE INFO OVERLAY ══════════════ */
    .mobile-info-overlay { 
      position: fixed; inset: 0; background: var(--bg); z-index: 150; 
      display: flex; flex-direction: column; justify-content: center; padding: 40px;
      transform: translateY(-100%); transition: transform 0.6s var(--silk);
    }
    .mobile-info-overlay.open { transform: translateY(0); }
    .close-info { position: absolute; top: 20px; right: 20px; font-family: var(--ff-feature); font-size: 1.5rem; }

    /* ══ MOBILE FIXES ═════════════════════ */
    @media (max-width: 768px) {
      :root { --header-h: 60px; --strip-h: 40vh; --gap: 0px; }
      .top-cats, .top-contact, .about-info-col { display: none; }
      .info-trigger { display: block; }
      .top-bar { padding: 0 20px; }
      .bottom-area { padding: 0 20px 60px; }
      .about-text { font-size: 18pt; max-width: 100%; }
      .about-text.shrunk { font-size: 11pt; transform: translateY(10px); color: rgba(0,0,0,0.4); }
      body.is-dark .about-text.shrunk { color: rgba(255,255,255,0.4); }
      .bottom-logo { width: 80px; height: 80px; }
      .strip-meta { top: -65px; font-size: 0.8rem; }
    }

    /* ══ PROJECT PAGE TAKEOVER ════════════ */
    .proj-page { position: fixed; inset: 0; z-index: 200; overflow-y: auto; background: #FFF !important; color: #000 !important; transform: translateY(100%); transition: transform .7s var(--silk); scrollbar-width: none; touch-action: auto; }
    .proj-page.open { transform: translateY(0); }
    .proj-close { position: fixed; top: 32px; right: 32px; width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid #000; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #fff; z-index: 210; }
    
    .proj-container { padding: 120px 32px; max-width: 1200px; margin: 0 auto; }
    .proj-big-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 60px; letter-spacing: -0.01em; }
    .proj-media { width: 100%; border-radius: 2px; opacity: 0; transform: translateY(20px); transition: 0.8s var(--silk); margin-bottom: 60px; }
    .revealed { opacity: 1 !important; transform: translateY(0) !important; }
    
    .loading-screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 300; font-size: .65rem; color: rgba(0,0,0,.3); font-family: var(--ff-feature); }
  </style>
</head>
<body>

<div class="grain"></div>

<div class="mobile-info-overlay" id="info-overlay">
  <button class="close-info" id="close-info">×</button>
  <div class="about-info-col" style="display:flex !important; font-size: 1.2rem;">
    <div><div class="label">Instagram</div><a href="https://instagram.com/alexjohntait" target="_blank" class="about-link">@alexjohntait</a></div>
    <div><div class="label">Email</div><a href="mailto:alex@alexjohntait.com" class="about-link">alex@alexjohntait.com</a></div>
    <div><div class="label">Representation</div><a href="https://jelly.london" target="_blank" class="about-link">Jelly</a></div>
  </div>
</div>

<div class="main">
  <div class="loading-screen" id="loading-screen">Establishing session...</div>
  <div class="top-bar">
    <div class="top-name">Alex Tait</div>
    <div id="top-cats" style="display:none;"></div> <!-- Reserved for filter logic -->
    <div class="top-right">
        <div class="top-contact" id="top-contact">Say hello</div>
        <button class="info-trigger" id="info-trigger">Info</button>
    </div>
  </div>
  
  <div class="middle-area">
    <div class="strip-outer" id="strip-outer"><div class="strip" id="strip"></div></div>
  </div>

  <div class="bottom-area">
    <div class="about-cols">
      <div class="about-text" id="about-text">Illustrator and motion designer specializing in character design, surreal and spirited.</div>
      <div class="about-info-col">
        <div><div class="label">Instagram</div><a href="https://instagram.com/alexjohntait" target="_blank" class="about-link">@alexjohntait</a></div>
        <div><div class="label">Email</div><a href="mailto:alex@alexjohntait.com" class="about-link">alex@alexjohntait.com</a></div>
        <div><div class="label">Representation</div><a href="https://jelly.london" target="_blank" class="about-link">Jelly</a></div>
      </div>
    </div>
    <div class="bottom-logo"><img src="" alt="logo" id="site-logo"></div>
  </div>
</div>

<div class="proj-page" id="proj-page">
  <button class="proj-close" id="proj-close">×</button>
  <div class="proj-container">
    <div class="proj-big-title" id="proj-big-title"></div>
    <div id="proj-dynamic-content"></div>
  </div>
</div>

<script>
const AT_TOKEN='pat6oEno5GJwLCguu.377d0ed4b98c6be08dfd7438f816b0c2ba009e38655727443cfb12e67b083ee0';
const AT_BASE='appjYUthm8ib2ctuH';
const F={title:'Title',caption:'Detailed Description',category:'Category',heroImg:'Hero Image',mosaicImg:'Mosaic Images',bg:'Background',logo:'Site Logo',order:'Order'};

let allProjects=[], filtered=[], activeIdx=0, isScrolling=false, touchStartX = 0;

setTimeout(() => { document.getElementById('loading-screen').style.display='none'; }, 1000);

function toSentenceCase(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : ''; }
function isDark(color) {
  if(!color) return false;
  const hex = color.replace('#', '');
  const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
  return ((r * 299) + (g * 587) + (b * 114)) / 1000 < 128;
}

async function fetchAll(){
  try {
    const table = 'Projects';
    let recs=[], off='';
    do {
      let url = `https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}?pageSize=100`;
      if (off) url += `&offset=${off}`;
      let r = await fetch(url, {headers:{Authorization:`Bearer ${AT_TOKEN}`}});
      const d = await r.json(); recs = recs.concat(d.records); off = d.offset || '';
    } while(off);
    
    recs.sort((a,b) => (a.fields[F.order] || 999) - (b.fields[F.order] || 999));
    
    for(const rec of recs){ 
      if(rec.fields[F.logo]?.[0]?.url) { 
        document.getElementById('site-logo').src = rec.fields[F.logo][0].url; 
        break; 
      } 
    }

    return recs.map(rec => ({
      title: rec.fields[F.title] || 'Untitled', 
      caption: toSentenceCase(rec.fields[F.caption] || ''),
      cat: toSentenceCase((rec.fields[F.category]||'Personal').trim()),
      year: rec.fields['Year'] || '2026', 
      bg: rec.fields[F.bg] || '#ffffff',
      heroAtt:(rec.fields[F.heroImg]||[])[0],
      atts:[...(rec.fields[F.heroImg]||[]), ...(rec.fields[F.mosaicImg]||[])]
    }));
  } catch(e) { return []; }
}

function build(){
  const strip = document.getElementById('strip'); strip.innerHTML = '';
  if (allProjects.length === 0) return;
  const loop = [...allProjects, ...allProjects, ...allProjects];
  
  loop.forEach((p, i) => {
    const el = document.createElement('div'); el.className = 'strip-item-wrap';
    const h = document.querySelector('.strip-outer').offsetHeight;
    const w = p.heroAtt ? Math.round(h * (p.heroAtt.width/p.heroAtt.height)) : 300;
    el.style.width = w + 'px';
    
    el.innerHTML = `
      <div class="strip-meta">
        <div>${p.title.toLowerCase()}</div>
        <div class="meta-detail">industry: ${p.cat} — ${p.year}</div>
      </div>
      <div class="strip-img-wrap">${media(p.heroAtt, 'strip-img')}</div>
    `;
    el.onclick = () => (activeIdx === i) ? openProject(i % allProjects.length) : goTo(i);
    strip.appendChild(el);
  });
  activeIdx = allProjects.length; goTo(activeIdx, true);
}

function goTo(i, inst = false){
  const strip = document.getElementById('strip');
  strip.style.transition = inst ? 'none' : 'transform 0.6s var(--silk)';
  activeIdx = i;
  const items = document.querySelectorAll('.strip-item-wrap');
  if (!items[i]) return;
  
  let x = 0; 
  for(let j=0; j<i; j++) x += items[j].offsetWidth;
  
  strip.style.transform = `translateX(${-(x + items[i].offsetWidth/2 - window.innerWidth/2)}px)`;
  items.forEach((el, j) => el.classList.toggle('active', j === i));
  
  const aboutText = document.getElementById('about-text');
  if(window.innerWidth <= 768) {
    if(activeIdx !== allProjects.length) aboutText.classList.add('shrunk');
    else aboutText.classList.remove('shrunk');
  }

  const p = allProjects[i % allProjects.length];
  if(p){ document.body.style.backgroundColor = p.bg; document.body.classList.toggle('is-dark', isDark(p.bg)); }
  
  if(!inst) {
      strip.addEventListener('transitionend', () => {
          if(activeIdx < allProjects.length) goTo(activeIdx + allProjects.length, true);
          if(activeIdx >= allProjects.length * 2) goTo(activeIdx - allProjects.length, true);
      }, {once: true});
  }
}

function openProject(i){
  const p = allProjects[i];
  document.getElementById('proj-big-title').textContent = p.title.toLowerCase();
  const cont = document.getElementById('proj-dynamic-content'); cont.innerHTML = '';
  p.atts.forEach((att, idx) => {
    const mStr = media(att, 'proj-media');
    const temp = document.createElement('div'); temp.innerHTML = mStr;
    const m = temp.firstChild;
    cont.appendChild(m);
    new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('revealed'); }), {threshold: 0.1}).observe(m);
  });
  document.getElementById('proj-page').classList.add('open');
}

function media(att, cls){
  if(!att) return '';
  const isVid = (att.type?.startsWith('video') || att.url.toLowerCase().endsWith('.mp4'));
  return isVid ? `<video src="${att.url}" autoplay muted loop playsinline class="${cls}"></video>` : `<img src="${att.url}" class="${cls}">`;
}

document.getElementById('proj-close').onclick = () => document.getElementById('proj-page').classList.remove('open');
document.getElementById('info-trigger').onclick = () => document.getElementById('info-overlay').classList.add('open');
document.getElementById('close-info').onclick = () => document.getElementById('info-overlay').classList.remove('open');
document.getElementById('top-contact').onclick = () => window.location.href = 'mailto:alex@alexjohntait.com';

window.onwheel = e => { if(!document.getElementById('proj-page').classList.contains('open') && Math.abs(e.deltaY)>15 && !isScrolling){ isScrolling=true; goTo(activeIdx+(e.deltaY>0?1:-1)); setTimeout(()=>isScrolling=false,400); } };
window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, false);
window.addEventListener('touchend', e => {
    if(document.getElementById('proj-page').classList.contains('open') || isScrolling) return;
    let delta = touchStartX - e.changedTouches[0].clientX;
    if(Math.abs(delta) > 40) { isScrolling=true; goTo(activeIdx+(delta > 0 ? 1 : -1)); setTimeout(()=>isScrolling=false,400); }
}, false);

async function init(){ 
  allProjects = await fetchAll(); 
  if (allProjects.length > 0) { build(); }
  document.getElementById('loading-screen').style.display='none'; 
}
init();
</script>
</body>
</html>
