<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex Tait</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --default-bg: #E8E7E2; --text: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--default-bg); font-family: 'Manrope', sans-serif; color: var(--text); overflow: hidden; }

        /* --- v115 LOADER --- */
        #load-screen { position: fixed; inset: 0; background: var(--default-bg); z-index: 99999; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease; cursor: pointer; }
        #load-screen.hide { opacity: 0; pointer-events: none; }
        #lottie-loader { width: 100vw; height: 100vh; }

        /* --- DESKTOP UI --- */
        #site-logo { position: fixed; z-index: 9005; top: 30px; left: 30px; width: 140px; cursor: pointer; }
        #site-logo img { width: 100%; height: auto; }
        #info-trigger { position: fixed; z-index: 9005; top: 30px; right: 30px; font-size: 48px; font-weight: 800; cursor: pointer; text-transform: none !important; }
        #filter-bar { position: fixed; z-index: 8000; top: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        .filter-btn { font-size: 48px; font-weight: 800; opacity: 0.15; cursor: pointer; transition: 0.4s; line-height: 1.2; text-transform: capitalize; }
        .filter-btn.active { opacity: 1; }

        /* --- CAROUSEL --- */
        #viewport { position: absolute; inset: 0; display: flex; align-items: center; z-index: 10; }
        #mover { display: flex; align-items: center; will-change: transform; }
        .item { flex-shrink: 0; padding: 0 60px; cursor: pointer; }
        .item img, .item video { height: 60vh !important; width: auto !important; border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.1); display: block; }

        /* --- INFO OVERLAY --- */
        .overlay { position: fixed; inset: 0; z-index: 10000; display: none; overflow-y: auto; opacity: 0; transition: 0.5s; background: var(--default-bg); padding: 120px 60px; }
        .overlay.active { display: flex; opacity: 1; }
        .close-btn { position: fixed; top: 30px; right: 30px; font-size: 48px; font-weight: 800; cursor: pointer; z-index: 11000; }
        .info-magazine-grid { display: grid; grid-template-columns: 32% 43% 25%; gap: 60px; max-width: 1600px; margin: 0 auto; width: 100%; }
        .info-img-col img { width: 100%; border-radius: 20px; }
        .bio-text { font-size: 28px; font-weight: 500; line-height: 1.35; }

        /* --- MOBILE REDESIGN (v115) --- */
        @media (max-width: 768px) {
            #viewport { display: block; padding-top: 250px; overflow-y: auto; position: relative; }
            #mover { flex-direction: column; gap: 40px; padding: 20px; }
            .item { width: 100%; padding: 0; }
            .item img, .item video { width: 100% !important; height: auto !important; border-radius: 12px; }
            #site-logo { width: 55px; top: 20px; left: 20px; }
            #info-trigger { font-size: 16px; top: 22px; right: 20px; text-transform: none !important; }
            
            /* FORCE STACKED BLACK NAV */
            #filter-bar { top: 80px; gap: 6px; flex-direction: column !important; width: 100%; }
            .filter-btn { font-size: 30px !important; color: #000000 !important; font-weight: 800; }
            
            /* v115 INFO PAGE FIX: Clear the "X" button */
            .overlay { padding: 140px 24px 60px 24px; }
            .close-btn { top: 15px; right: 20px; font-size: 28px; background: var(--default-bg); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
            .info-magazine-grid { display: flex; flex-direction: column; align-items: flex-start; gap: 30px; text-align: left; }
            #bio-image-container { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; }
            #mobile-header-shield { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 235px; background: var(--default-bg); z-index: 9000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        }
    </style>
</head>
<body>
<div id="load-screen" onclick="this.classList.add('hide')"><div id="lottie-loader"></div></div>
<div id="site-logo" onclick="location.reload()"></div>
<div id="info-trigger" onclick="openOverlay('info')">Info</div>
<div id="mobile-header-shield"></div>
<div id="filter-bar">
    <div class="filter-btn active" onclick="setFilter('commercial')">Commercial</div>
    <div class="filter-btn" onclick="setFilter('editorial')">Editorial</div>
    <div class="filter-btn" onclick="setFilter('personal')">Personal</div>
</div>
<div id="viewport"><main id="mover"></main></div>
<div id="info-overlay" class="overlay">
    <div class="close-btn" onclick="closeAll()">✕</div>
    <div class="info-magazine-grid">
        <div class="info-img-col" id="bio-image-container"></div>
        <div class="bio-text">Alex Tait is an illustrator and motion designer crafting surreal, spirited worlds bursting with color...</div>
        <div style="font-size: 16px; line-height: 2;">
            <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 5px;">Contact</h3>
            <a href="mailto:alexjohntait@gmail.com" style="color:inherit; text-decoration:none;">alexjohntait@gmail.com</a><br>
            Represented by Jelly
        </div>
    </div>
</div>
<script>
const DB = { base: 'appjYUthm8ib2ctuH', table: 'Projects', key: 'pat1U3rYUa5yFPgfe.fcd6014565ed789ef453fad674f8f24815a5112bfcb046ca1cfea32ea77dcf70' };
let all = [], list = [], targetX = 0, currentX = 0, velocity = 0, isOverlay = false, moverSetWidth = 0, itemCenters = [];
lottie.loadAnimation({ container: document.getElementById('lottie-loader'), renderer: 'svg', loop: true, autoplay: true, path: './loader.json', rendererSettings: { preserveAspectRatio: 'xMidYMid slice' } });
async function run() {
    try {
        const res = await fetch(`https://api.airtable.com/v0/${DB.base}/${encodeURIComponent(DB.table)}?sort%5B0%5D%5Bfield%5D=Order`, { headers: { Authorization: `Bearer ${DB.key}` } });
        const data = await res.json();
        const logoRec = data.records.find(r => r.fields['Site Logo']);
        if(logoRec) document.getElementById('site-logo').innerHTML = `<img src="${logoRec.fields['Site Logo'][0].url}">`;
        const bioRec = data.records.find(r => r.fields['Bio Image']);
        if(bioRec) document.getElementById('bio-image-container').innerHTML = `<img src="${bioRec.fields['Bio Image'][0].url}" style="width:100%; height:100%; object-fit:cover;">`;
        all = data.records.map(r => {
            const hero = r.fields['Hero Image']?.[0];
            return { title: r.fields.Title || '', cat: String(r.fields.Category || '').toLowerCase(), url: hero?.url || '', isVid: hero?.type?.includes('video') || hero?.url?.match(/\.(mp4|mov|webm|quicktime)/i), bg: r.fields['Background'] || '#E8E7E2' };
        }).filter(p => p.url);
        setFilter('commercial');
        setTimeout(() => document.getElementById('load-screen').classList.add('hide'), 5000);
        requestAnimationFrame(loop);
    } catch(e) { console.error(e); }
}
function setFilter(cat) {
    list = all.filter(r => r.cat === cat);
    const mover = document.getElementById('mover'); mover.innerHTML = '';
    const isMobile = window.innerWidth < 769;
    const items = isMobile ? list : [...list, ...list, ...list];
    items.forEach((p) => {
        const div = document.createElement('div'); div.className = 'item';
        if(p.isVid) { div.innerHTML = `<video src="${p.url}" autoplay loop muted playsinline onloadedmetadata="calculateCenters()"></video>`; }
        else { div.innerHTML = `<img src="${p.url}" onload="calculateCenters()">`; }
        mover.appendChild(div);
    });
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === cat));
}
function calculateCenters() {
    if(window.innerWidth < 769) return;
    const items = document.querySelectorAll('.item');
    itemCenters = []; let acc = 0;
    items.forEach(item => { const w = item.offsetWidth || 500; itemCenters.push(acc + (w / 2)); acc += w; });
    moverSetWidth = acc / 3;
    if(currentX === 0) { currentX = itemCenters[list.length] || 0; targetX = currentX; }
}
function openOverlay(id) { isOverlay = true; document.getElementById(`${id}-overlay`).classList.add('active'); }
function closeAll() { isOverlay = false; document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }
function loop() {
    if(!isOverlay && moverSetWidth > 0 && window.innerWidth > 768) {
        velocity = (velocity + (targetX - currentX) * 0.02) * 0.85;
        currentX += velocity;
        if(currentX > moverSetWidth * 2) { currentX -= moverSetWidth; targetX -= moverSetWidth; }
        if(currentX < moverSetWidth) { currentX += moverSetWidth; targetX += moverSetWidth; }
        document.getElementById('mover').style.transform = `translateX(${-currentX + (window.innerWidth / 2)}px)`;
        document.body.style.backgroundColor = list[0]?.bg || '#E8E7E2';
    }
    requestAnimationFrame(loop);
}
window.addEventListener('wheel', e => { if(!isOverlay && window.innerWidth > 768) targetX += e.deltaY * 1.1; }, { passive: true });
run();
</script>
</body>
</html>
