<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Alex Tait — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Avenue Mono';
      src: url('path-to-your-font/AvenueMono.woff2') format('woff2');
      font-weight: normal; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased; touch-action: none; }
    img, video { display: block; max-width: none; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    :root {
      --ff: 'Geist', system-ui, sans-serif;
      --ff-feature: 'Avenue Mono', 'Geist Mono', monospace; 
      --silk: cubic-bezier(.22, 1, .36, 1);
      --bg: #FFFFFF;
      --ink: #000000;
      --strip-h: 37vh; 
      --header-h: 80px;
    }

    body {
      display: flex; flex-direction: column; height: 100vh;
      font-family: var(--ff); background: var(--bg); color: var(--ink);
      transition: background-color 0.8s var(--silk), color 0.8s var(--silk);
    }

    body.is-dark { --ink: #FFFFFF; }

    .grain {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Noise.png");
      opacity: 0.04; pointer-events: none; z-index: 999; animation: grain 8s steps(10) infinite;
    }
    @keyframes grain { 0%, 100% { transform:translate(0, 0) } 50% { transform:translate(-5%, -10%) } }

    .main { display: flex; flex-direction: column; height: 100vh; width: 100%; overflow: hidden; position: relative; }

    /* ══ TOP BAR ══════════════════════════ */
    .top-bar {
      flex-shrink: 0; height: var(--header-h); display: flex;
      align-items: center; justify-content: space-between; padding: 0 32px; z-index: 100;
    }
    .top-name { font-family: var(--ff-feature); font-size: 1rem; letter-spacing: -0.01em; }
    .top-cats { display: flex; gap: 12px; font-size: 0.8rem; color: #aaa; }
    .top-cat { cursor: pointer; transition: color .2s; }
    .top-cat.active { color: var(--ink); }
    .top-contact { font-size: 0.8rem; font-weight: 600; border-bottom: 1.5px solid var(--ink); padding-bottom: 2px; }

    /* ══ CAROUSEL ═════════════════════════ */
    .middle-area { flex: 1; display: flex; align-items: center; overflow: visible; width: 100%; }
    .strip-outer { width: 100%; height: var(--strip-h); position: relative; overflow: visible; }
    .strip { display: flex; height: 100%; transition: transform 0.6s var(--silk); will-change: transform; overflow: visible; }
    
    .strip-item-wrap { 
      flex-shrink: 0; height: 100%; display: flex; flex-direction: column; 
      cursor: pointer; position: relative; padding: 0 15px; z-index: 1;
    }
    .strip-item-wrap.active { z-index: 10 !important; }

    /* MOVED META BELOW IMAGES TO PREVENT HEADER CONFLICT */
    .strip-meta { 
      position: absolute; bottom: -40px; left: 15px; font-size: 0.75rem; 
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; 
    }
    .strip-item-wrap.active .strip-meta { opacity: 0.6; }

    .strip-img-wrap { height: 100%; position: relative; overflow: visible; }
    .strip-img { height: 100%; width: auto; object-fit: contain; transition: transform 0.6s var(--silk); transform-origin: center center; }
    
    @media (min-width: 769px) { 
      .strip-item-wrap.active .strip-img { transform: scale(1.4); } 
    }

    /* ══ BOTTOM AREA ══════════════════════ */
    .bottom-area { flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 32px 40px; min-height: 20vh; z-index: 10; }
    .about-cols { display: flex; align-items: flex-end; gap: 100px; }
    .about-text { font-size: 26pt; line-height: 1.1; letter-spacing: -0.02em; font-weight: 500; max-width: 32ch; }
    
    .about-info-col { display: flex; flex-direction: column; gap: 15px; font-family: var(--ff-feature); font-size: 0.8rem; line-height: 1.2; }
    .about-link { border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 2px; }
    .label { opacity: 0.4; font-size: 0.6rem; text-transform: lowercase; margin-bottom: 4px; }
    .bottom-logo { width: 100px; height: 100px; flex-shrink: 0; }

    /* ══ WHITE PROJECT PAGE ═══════ */
    .proj-page { 
      position: fixed; inset: 0; z-index: 200; overflow-y: auto; 
      background: #FFFFFF !important; color: #000000 !important; 
      transform: translateY(100%); transition: transform .7s var(--silk); 
      scrollbar-width: none; touch-action: auto;
    }
    .proj-page.open { transform: translateY(0); }
    .proj-close-wrap { position: fixed; top: 32px; right: 32px; z-index: 210; }
    .proj-close { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid #000; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #fff; }
    
    .proj-container { padding: 120px 32px 0; max-width: 1200px; margin: 0 auto; }
    .proj-meta-row { display: flex; gap: 40px; margin-bottom: 20px; font-family: var(--ff-feature); font-size: 0.5rem; opacity: 0.4; }
    .proj-big-title { font-size: 1.8rem; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 60px; }
    
    .proj-asset-wrap { position: relative; margin-bottom: 60px; }
    .proj-media { width: 100%; height: auto; border-radius: 2px; opacity: 0; transform: translateY(20px); transition: all 0.8s var(--silk); }
    .proj-asset-wrap::before { content: "fig " attr(data-index); position: absolute; top: -18px; left: 0; font-family: var(--ff-feature); font-size: 8px; opacity: 0.3; }

    .layout-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .layout-stagger-left { width: 70%; margin-right: auto; }
    .layout-stagger-right { width: 70%; margin-left: auto; }
    
    .proj-caption-editorial { font-size: 1.5rem; line-height: 1.3; font-weight: 400; max-width: 32ch; margin: 100px 0; opacity: 0; transform: translateY(20px); transition: 0.8s var(--silk); }
    .revealed { opacity: 1 !important; transform: translateY(0) !important; }

    .proj-footer-nav { height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 100px; cursor: pointer; }
    .next-sub { font-family: var(--ff-feature); font-size: 0.7rem; opacity: 0.4; margin-bottom: 8px; }
    .next-title { font-size: 1.5rem; font-weight: 600; }

    /* ══ MOBILE FIXES ═══════════════════ */
    @media (max-width: 768px) {
      :root { --header-h: 60px; --strip-h: 40vh; }
      .top-cats { display: none; }
      .top-bar { height: var(--header-h); padding: 0 20px; }
      .middle-area { padding-top: 0; }
      .strip-item-wrap { padding: 0 10px; }
      .strip-meta { bottom: -30px; left: 10px; font-size: 0.65rem; }
      
      /* STACK MOBILE FOOTER LINKS */
      .bottom-area { flex-direction: column; align-items: flex-start; gap: 40px; padding: 20px 20px 80px; height: auto; }
      .about-cols { flex-direction: column; align-items: flex-start; gap: 35px; }
      .about-text { font-size: 18pt; max-width: 100%; }
      .about-info-col { flex-direction: column; gap: 15px; width: 100%; }
      
      .bottom-logo { width: 80px; height: 80px; }
      .proj-container { padding: 80px 20px 0; }
      .proj-big-title { font-size: 1.5rem; }
      .layout-grid-2 { grid-template-columns: 1fr; gap: 20px; }
      .layout-stagger-left, .layout-stagger-right { width: 100%; }
      .proj-caption-editorial { font-size: 1.2rem; }
      .cursor, .cursor-ring { display: none !important; }
      * { cursor: auto !important; }
    }

    .cursor { position: fixed; width: 8px; height: 8px; border-radius: 50%; background: var(--ink); pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .3s, height .3s, background 0.8s; mix-blend-mode: multiply; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    body.is-dark .cursor { mix-blend-mode: screen; }
    .cursor span { font-family: var(--ff-feature); font-size: 10px; opacity: 0; color: var(--bg); transition: opacity 0.2s; }
    .cursor.big { width: 50px; height: 50px; background: var(--ink); }
    .cursor.big span { opacity: 1; }
    .cursor-ring { position: fixed; width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(128,128,128,0.2); pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); }
    .loading-screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 300; font-size: .65rem; color: rgba(0,0,0,.3); font-family: var(--ff-feature); }
  </style>
</head>
<body>

<div class="grain"></div>
<div class="cursor" id="cursor"><span>View</span></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div class="main">
  <div class="loading-screen" id="loading-screen">Establishing session...</div>
  <div class="top-bar">
    <div class="top-name">Alex Tait</div>
    <div class="top-cats" id="top-cats"></div>
    <div class="top-right"><div class="top-contact" id="top-contact">Say hello</div></div>
  </div>
  <div class="middle-area"><div class="strip-outer" id="strip-outer"><div class="strip" id="strip"></div></div></div>
  <div class="bottom-area">
    <div class="about-cols">
      <div class="about-text">Illustrator and motion designer with a simple style focused on expression and movement. Specialising in character design.</div>
      <div class="about-info-col">
        <div><div class="label">Instagram</div><a href="https://instagram.com/alexjohntait" target="_blank" class="about-link">@alexjohntait</a></div>
        <div><div class="label">Email</div><a href="mailto:alex@alexjohntait.com" class="about-link">alex@alexjohntait.com</a></div>
        <div><div class="label">Representation</div><a href="https://jelly.london" target="_blank" class="about-link">Jelly</a></div>
      </div>
    </div>
    <div class="bottom-logo"><img src="https://via.placeholder.com/150" alt="logo" id="site-logo"></div>
  </div>
</div>

<div class="proj-page" id="proj-page">
  <div class="proj-close-wrap"><button class="proj-close" id="proj-close">×</button></div>
  <div class="proj-container">
    <div class="proj-meta-row" id="proj-meta-header"></div>
    <div class="proj-big-title" id="proj-big-title"></div>
    <div id="proj-dynamic-content"></div>
    <div class="proj-footer-nav" id="proj-next-trigger">
        <span class="next-sub">Next project</span>
        <span class="next-title" id="next-proj-title"></span>
    </div>
  </div>
</div>

<script>
const AT_TOKEN='pat6oEno5GJwLCguu.377d0ed4b98c6be08dfd7438f816b0c2ba009e38655727443cfb12e67b083ee0';
const AT_BASE='appjYUthm8ib2ctuH';
const F={title:'Title',caption:'Detailed Description',category:'Category',heroImg:'Hero Image',mosaicImg:'Mosaic Images',bg:'Background',logo:'Site Logo',order:'Order'};

let allProjects=[], filtered=[], activeIdx=0, isScrolling=false, touchStartX = 0;

function toSentenceCase(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : ''; }
function isDark(color) {
  if(!color) return false;
  const hex = color.replace('#', '');
  const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
  return ((r * 299) + (g * 587) + (b * 114)) / 1000 < 128;
}

async function fetchAll(){
  try {
    const table = 'Projects';
    let recs=[], off='';
    do {
      let url = `https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(table)}?pageSize=100`;
      if (off) url += `&offset=${off}`;
      let r = await fetch(url, {headers:{Authorization:`Bearer ${AT_TOKEN}`}});
      const d = await r.json(); 
      if (d.records) recs = recs.concat(d.records); 
      off = d.offset || '';
    } while(off);
    recs.sort((a,b) => (a.fields[F.order] || 999) - (b.fields[F.order] || 999));
    for(const rec of recs){ if(rec.fields[F.logo]?.[0]?.url) { document.getElementById('site-logo').src = rec.fields[F.logo][0].url; break; } }
    return recs.map(rec => ({
      title: toSentenceCase(rec.fields[F.title] || 'Untitled'), 
      caption: toSentenceCase(rec.fields[F.caption] || ''),
      cat: toSentenceCase((rec.fields[F.category]||'Personal').trim()),
      bg: rec.fields[F.bg] || '#ffffff',
      heroAtt:(rec.fields[F.heroImg]||[])[0],
      atts:[...(rec.fields[F.heroImg]||[]), ...(rec.fields[F.mosaicImg]||[])]
    }));
  } catch(e) { return []; }
}

function buildTopCats(){
  const cats = ['All', 'Commercial', 'Editorial', 'Personal'];
  document.getElementById('top-cats').innerHTML = cats.map(c => `<span class="top-cat ${c==='All'?'active':''}" data-filter="${c}">${c}</span>`).join(', ');
  document.querySelectorAll('.top-cat').forEach(el => el.onclick = () => setFilter(el.dataset.filter));
}

function build(){
  const strip = document.getElementById('strip'); strip.innerHTML = '';
  if (filtered.length === 0) return;
  const loop = [...filtered, ...filtered, ...filtered];
  const isMobile = window.innerWidth <= 768;
  const itemsToRender = isMobile ? filtered : loop;

  itemsToRender.forEach((p, i) => {
    const el = document.createElement('div'); el.className = 'strip-item-wrap';
    const h = document.querySelector('.strip-outer').offsetHeight;
    const w = p.heroAtt ? Math.round(h * (p.heroAtt.width/p.heroAtt.height)) : 300;
    el.style.width = w + 'px';
    el.innerHTML = `<div class="strip-img-wrap">${media(p.heroAtt, 'strip-img')}</div><div class="strip-meta">${p.title}</div>`;
    el.onclick = () => isMobile ? openProject(i) : (activeIdx === i) ? openProject(i % filtered.length) : goTo(i);
    strip.appendChild(el);
  });
  if(!isMobile) { activeIdx = filtered.length; goTo(activeIdx, true); }
}

function goTo(i, inst = false){
  const strip = document.getElementById('strip');
  strip.style.transition = inst ? 'none' : 'transform 0.6s var(--silk)';
  activeIdx = i;
  const items = document.querySelectorAll('.strip-item-wrap');
  if (!items[i]) return;
  let x = 0; for(let j=0; j<i; j++) x += items[j].offsetWidth;
  strip.style.transform = `translateX(${-(x + items[i].offsetWidth/2 - window.innerWidth/2)}px)`;
  items.forEach((el, j) => el.classList.toggle('active', j === i));
  const p = filtered[i % filtered.length];
  if(p){ document.body.style.backgroundColor = p.bg; document.body.classList.toggle('is-dark', isDark(p.bg)); }
  if(!inst) {
      strip.addEventListener('transitionend', () => {
          if(activeIdx < filtered.length) goTo(activeIdx + filtered.length, true);
          if(activeIdx >= filtered.length * 2) goTo(activeIdx - filtered.length, true);
      }, {once: true});
  }
}

function setFilter(f){
  document.querySelectorAll('.top-cat').forEach(el => el.classList.toggle('active', el.dataset.filter === f));
  filtered = (f === 'All') ? allProjects : allProjects.filter(p => p.cat === f);
  build();
}

const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('revealed'); }), {threshold: 0.1});

function openProject(i){
  const p = filtered[i]; const next = filtered[(i+1)%filtered.length];
  document.getElementById('proj-meta-header').innerHTML = `<div>Industry: ${p.cat}</div>`;
  document.getElementById('proj-big-title').textContent = p.title;
  document.getElementById('next-proj-title').textContent = next.title;
  const cont = document.getElementById('proj-dynamic-content'); cont.innerHTML = '';
  p.atts.forEach((att, idx) => {
    const wrap = document.createElement('div'); wrap.className = 'proj-asset-wrap';
    wrap.setAttribute('data-index', String(idx+1).padStart(2,'0'));
    wrap.innerHTML = media(att, 'proj-media');
    if(idx < 2){
      if(idx===0){ const g = document.createElement('div'); g.className='layout-grid-2'; g.appendChild(wrap); cont.appendChild(g); }
      else { 
        if(cont.querySelector('.layout-grid-2')) cont.querySelector('.layout-grid-2').appendChild(wrap);
        const cap = document.createElement('div'); cap.className='proj-caption-editorial'; cap.textContent=p.caption; cont.appendChild(cap); obs.observe(cap);
      }
    } else { wrap.classList.add(['layout-stagger-left','layout-full','layout-stagger-right'][idx%3]); cont.appendChild(wrap); }
    obs.observe(wrap.querySelector('.proj-media'));
  });
  document.getElementById('proj-page').classList.add('open');
  document.getElementById('proj-page').scrollTop = 0;
  document.getElementById('proj-next-trigger').onclick = () => { if(window.innerWidth > 768) goTo(i+1+filtered.length); openProject((i+1)%filtered.length); };
}

function media(att, cls){
  if(!att) return '';
  const isVid = (att.type?.startsWith('video') || att.url.toLowerCase().endsWith('.mp4'));
  return isVid ? `<video src="${att.url}" autoplay muted loop playsinline class="${cls}"></video>` : `<img src="${att.url}" class="${cls}">`;
}

document.getElementById('proj-close').onclick = () => document.getElementById('proj-page').classList.remove('open');
document.getElementById('top-contact').onclick = () => window.location.href = 'mailto:alex@alexjohntait.com';

// QUICKER WHEEL SCROLL
window.onwheel = e => { 
  if(!document.getElementById('proj-page').classList.contains('open') && Math.abs(e.deltaY)>15 && !isScrolling){ 
    isScrolling=true; 
    goTo(activeIdx+(e.deltaY>0?1:-1)); 
    setTimeout(()=>isScrolling=false,400); // Shorter cooldown
  } 
};

window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, false);
window.addEventListener('touchend', e => {
    if(document.getElementById('proj-page').classList.contains('open') || isScrolling) return;
    let touchEndX = e.changedTouches[0].clientX;
    let delta = touchStartX - touchEndX;
    if(Math.abs(delta) > 40) { isScrolling=true; goTo(activeIdx+(delta > 0 ? 1 : -1)); setTimeout(()=>isScrolling=false,400); }
}, false);

const cur=document.getElementById('cursor'), rng=document.getElementById('cursor-ring');
let mx=0, my=0, rx=0, ry=0;
document.onmousemove = e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; };
(function anim(){ rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12; rng.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(anim); })();
document.onmouseover = e => { if(e.target.closest('.strip-item-wrap, .top-cat, .top-contact, .proj-close, .proj-footer-nav, .about-link')) cur.classList.add('big'); };
document.onmouseout = e => { if(e.target.closest('.strip-item-wrap, .top-cat, .top-contact, .proj-close, .proj-footer-nav, .about-link')) cur.classList.remove('big'); };

async function init(){ 
  const loaderTimeout = setTimeout(() => { document.getElementById('loading-screen').style.display='none'; }, 1000);
  allProjects=await fetchAll(); 
  if (allProjects.length > 0) { filtered=[...allProjects]; buildTopCats(); build(); }
  clearTimeout(loaderTimeout); document.getElementById('loading-screen').style.display='none'; 
}
init();
</script>
</body>
</html>
