<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex Tait — Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000; --text: #ffffff; --line: rgba(255,255,255,0.15); 
            --pepper-pink: #ff00ff;
            --grid-rows: 4; 
            --mobile-cols: 2;
        }
        [data-theme="light"] { 
            --bg: #ffffff; --text: #000000; --line: rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); font-family: 'Lexend', sans-serif; color: var(--text); overflow-x: hidden; transition: background-color 0.4s ease; }

        /* --- UI: THEME TOGGLE (Bottom Right) --- */
        #theme-toggle { 
            position: fixed; bottom: 30px; right: 30px; z-index: 20000; 
            cursor: pointer; width: 44px; height: 44px; opacity: 0.5;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border-radius: 50%;
        }
        .mode-icon { width: 16px; height: 16px; border: 2px solid currentColor; border-radius: 50%; }
        [data-theme="light"] .mode-icon { background: currentColor; }

        /* --- UI: DESKTOP ZOOM --- */
        #zoom-container {
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 20px;
            pointer-events: none;
        }
        /* v185: Hidden "2x" label for cleaner Desktop HUD */
        #zoom-label { display: none; }
        
        .slider-wrapper {
            height: 240px; width: 44px; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 22px; border: 1px solid var(--line);
            position: relative; pointer-events: auto; cursor: ns-resize;
            display: flex; justify-content: center; overflow: hidden;
        }
        .slider-wrapper::before {
            content: ''; position: absolute; inset: 20px 0;
            background-image: repeating-linear-gradient(to bottom, var(--line) 0px, var(--line) 1px, transparent 1px, transparent 12px);
            width: 12px; margin: 0 auto; opacity: 0.5;
        }
        #zoom-slider { -webkit-appearance: none; width: 200px; height: 100%; background: transparent; transform: rotate(-90deg); position: absolute; outline: none; cursor: pointer; z-index: 2; }
        #zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 40px; width: 2px; background: var(--pepper-pink); box-shadow: 0 0 10px var(--pepper-pink); }

        /* --- MAIN SPLIT --- */
        #main-container { display: grid; grid-template-columns: 2fr 1fr; width: 100vw; height: 100vh; }

        /* --- GRID --- */
        #grid-rail { 
            display: grid; grid-template-rows: repeat(var(--grid-rows), 1fr); grid-auto-flow: column; 
            grid-auto-columns: calc(100vh / var(--grid-rows)); 
            width: 100%; height: 100vh; overflow-x: auto; overflow-y: hidden; 
            background: var(--bg); scrollbar-width: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 98%);
            mask-image: linear-gradient(to right, black 80%, transparent 98%);
        }
        .rail-item { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); overflow: hidden; transition: 0.4s ease; cursor: pointer; position: relative; }
        .rail-item img, .rail-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .rail-item:hover { grid-row: span 2; grid-column: span 2; z-index: 10; }

        /* --- SIDEBAR (DESKTOP) --- */
        #sidebar { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .sidebar-header { padding: 80px 40px 60px 40px; flex-grow: 1; }
        .about-text { font-size: 50px; line-height: 1.1; font-weight: 500; letter-spacing: -0.03em; }

        .sidebar-nav-row { display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; border-top: 1px solid var(--line); }
        .nav-col { padding: 40px 20px; border-right: 1px solid var(--line); }
        .nav-col:last-child { border-right: none; }
        .label { font-size: 12px; font-weight: 500; opacity: 0.3; margin-bottom: 30px; }
        .project-link, .contact-link { font-size: 12px; font-weight: 400; line-height: 2.3; opacity: 0.5; text-decoration: none; color: inherit; display: block; }

        /* --- MOBILE RE-ARCHITECTURE --- */
        @media (max-width: 768px) {
            #main-container { display: flex; flex-direction: column; height: auto; overflow-y: auto; overflow-x: hidden; }
            #zoom-container { display: none; }
            
            /* 1. Bio at Top */
            .sidebar-header { padding: 60px 25px 30px 25px; flex-grow: 0; }
            .about-text { font-size: 32px; }

            /* 2. Stacked Categories */
            .sidebar-nav-row { 
                display: flex; flex-direction: column; order: 2;
                border-top: none; border-bottom: none;
                padding: 0 25px 40px 25px; 
            }
            .nav-col { padding: 0; border: none; margin-bottom: 0; }
            .nav-col .label { font-size: 24px; opacity: 0.9; font-weight: 500; margin-bottom: 5px; }
            .project-link { display: none; } /* Keeping sidebar list for desktop only */
            
            /* 3. Grid under Categories */
            #grid-rail { 
                display: grid; order: 3;
                grid-template-columns: repeat(var(--mobile-cols), 1fr); 
                grid-template-rows: none; grid-auto-flow: row;
                width: 100vw; height: auto; overflow: visible;
                -webkit-mask-image: none; 
                border-top: 1px solid var(--line);
            }
            .rail-item { aspect-ratio: 1/1; border-right: 1px solid var(--line); }
            .rail-item:hover { grid-row: auto; grid-column: auto; }

            /* 4. Contact at the Absolute Bottom */
            #mobile-contact-footer {
                order: 4; padding: 60px 25px 120px 25px;
                display: flex; flex-direction: column; gap: 5px;
            }
            #mobile-contact-footer .label { font-size: 24px; opacity: 0.9; font-weight: 500; }
            .contact-link { font-size: 24px; opacity: 0.9; font-weight: 500; line-height: 1.2; padding: 2px 0; }

            #mobile-zoom-toggle {
                position: fixed; bottom: 30px; left: 30px; z-index: 20000;
                width: 44px; height: 44px; background: rgba(0,0,0,0.2); 
                backdrop-filter: blur(10px); border-radius: 50%; border: 1px solid var(--line);
                display: flex; align-items: center; justify-content: center; font-size: 10px;
                color: var(--text); opacity: 0.6;
            }
        }

        /* Hide mobile footer on desktop */
        @media (min-width: 769px) { #mobile-contact-footer { display: none; } }

        /* --- PROJECT OVERLAY --- */
        .overlay { position: fixed; inset: 0; z-index: 10000; background: var(--bg); transform: translateY(-100%); transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1); visibility: hidden; display: grid; grid-template-columns: 1fr 400px; }
        .overlay.active { transform: translateY(0); visibility: visible; }
        .close-trigger { position: fixed; top: 30px; right: 30px; font-size: 32px; font-weight: 200; cursor: pointer; opacity: 0.4; z-index: 20001; }
        
        #detail-gallery-col { height: 100vh; padding: 100px 60px; overflow-y: auto; scrollbar-width: none; display: flex; flex-direction: column; gap: 80px; align-items: center; border-right: 1px solid var(--line); }
        .detail-asset { width: 100%; max-width: 100%; height: auto; border-radius: 2px; object-fit: contain; }
        #detail-info-col { padding: 100px 0; height: 100vh; overflow-y: auto; }
        .info-block { padding: 25px 40px; border-bottom: 1px solid var(--line); }
        .info-value { font-size: 14px; font-weight: 500; }
        .info-caption { font-size: 16px; line-height: 1.6; font-weight: 300; opacity: 0.9; }

        @media (max-width: 768px) {
            .overlay { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            #detail-gallery-col { padding: 60px 15px; height: 70vh; border-right: none; }
            #detail-info-col { height: auto; padding: 20px; border-top: 1px solid var(--line); }
        }
    </style>
</head>
<body>

<div id="mobile-zoom-toggle" onclick="toggleMobileGrid()">2×</div>

<div id="zoom-container">
    <div class="slider-wrapper"><input type="range" id="zoom-slider" min="2" max="5" step="1" value="4"></div>
</div>

<div id="theme-toggle" onclick="toggleTheme()"><div class="mode-icon"></div></div>
<div class="close-trigger" id="close-btn" onclick="closeAll()">✕</div>

<main id="main-container">
    <div id="grid-rail"></div>
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="about-text">Alex Tait is an illustrator and motion designer crafting surreal worlds bursting with color.</div>
        </div>
        
        <div class="sidebar-nav-row">
            <div class="nav-col"><div class="label">Commercial</div><div id="list-commercial"></div></div>
            <div class="nav-col"><div class="label">Editorial</div><div id="list-editorial"></div></div>
            <div class="nav-col"><div class="label">Personal</div><div id="list-personal"></div></div>
            <div class="nav-col desktop-only-contact">
                <div class="label">Contact</div>
                <div class="contact-stack">
                    <a href="mailto:alexjohntait@gmail.com" class="contact-link">alexjohntait@gmail.com</a>
                    <div class="contact-link">+44(0) 7875127072</div>
                    <a href="https://instagram.com/alexjohntait" target="_blank" class="contact-link">Instagram</a>
                </div>
            </div>
        </div>

        <div id="mobile-contact-footer">
            <div class="label">Contact</div>
            <a href="mailto:alexjohntait@gmail.com" class="contact-link">alexjohntait@gmail.com</a>
            <div class="contact-link">+44(0) 7875127072</div>
            <a href="https://instagram.com/alexjohntait" target="_blank" class="contact-link">Instagram</a>
        </div>
    </aside>
</main>

<div id="project-overlay" class="overlay">
    <div id="detail-gallery-col"></div>
    <div id="detail-info-col">
        <div class="info-block"><div class="label">Client</div><div id="det-client" class="info-value"></div></div>
        <div class="info-block"><div class="label">Project</div><div id="det-title" class="info-value"></div></div>
        <div class="info-block"><div class="label">Year</div><div id="det-year" class="info-value"></div></div>
        <div class="info-block" style="border-bottom:none;"><div id="det-caption" class="info-caption"></div></div>
    </div>
</div>

<script>
const DB = { base: 'appjYUthm8ib2ctuH', table: 'Projects', key: 'pat1U3rYUa5yFPgfe.fcd6014565ed789ef453fad674f8f24815a5112bfcb046ca1cfea32ea77dcf70' };
let all = [], currentFilter = 'all';

function toggleMobileGrid() {
    const root = document.documentElement;
    const current = getComputedStyle(root).getPropertyValue('--mobile-cols').trim();
    const next = current == "2" ? "1" : "2";
    root.style.setProperty('--mobile-cols', next);
    document.getElementById('mobile-zoom-toggle').innerText = next + '×';
}

const slider = document.getElementById('zoom-slider');
const root = document.documentElement;
slider.addEventListener('input', (e) => {
    root.style.setProperty('--grid-rows', e.target.value);
});

async function run() {
    try {
        const res = await fetch(`https://api.airtable.com/v0/${DB.base}/${encodeURIComponent(DB.table)}?sort%5B0%5D%5Bfield%5D=Order`, { headers: { Authorization: `Bearer ${DB.key}` } });
        const data = await res.json();
        all = data.records.map(r => ({
            id: r.id, title: r.fields['Title'] || 'Untitled', client: r.fields['Client'] || 'N/A', year: r.fields['Year'] || '2024',
            caption: r.fields['Caption'] || '', cat: String(r.fields.Category || '').toLowerCase(),
            mosaic: r.fields['Mosaic Images'] || [], heroUrl: r.fields['Hero Image']?.[0]?.url || '',
            isVid: r.fields['Hero Image']?.[0]?.type?.includes('video'), assets: r.fields['Hero Image'] || []
        })).filter(p => p.heroUrl);
        renderUI();
    } catch(e) { console.error(e); }
}

function renderUI() {
    const rail = document.getElementById('grid-rail');
    const lists = { commercial: document.getElementById('list-commercial'), editorial: document.getElementById('list-editorial'), personal: document.getElementById('list-personal') };
    rail.innerHTML = '';
    all.forEach(p => {
        const item = document.createElement('div');
        item.className = 'rail-item';
        item.onclick = () => openProject(p.id);
        item.innerHTML = p.isVid ? `<video src="${p.heroUrl}" autoplay loop muted playsinline></video>` : `<img src="${p.heroUrl}">`;
        rail.appendChild(item);
        if (lists[p.cat]) {
            const link = document.createElement('div');
            link.className = 'project-link'; link.innerText = p.title;
            lists[p.cat].appendChild(link);
        }
    });
}

function openProject(id) {
    const p = all.find(proj => proj.id === id);
    document.getElementById('det-client').innerText = p.client;
    document.getElementById('det-title').innerText = p.title;
    document.getElementById('det-year').innerText = p.year;
    document.getElementById('det-caption').innerText = p.caption;
    const gallery = document.getElementById('detail-gallery-col'); gallery.innerHTML = '';
    (p.mosaic.length > 0 ? p.mosaic : p.assets).forEach(asset => {
        const isV = asset.type.includes('video');
        const el = document.createElement(isV ? 'video' : 'img');
        el.className = 'detail-asset'; el.src = asset.url;
        if(isV) { el.autoplay = true; el.loop = true; el.muted = true; el.playsInline = true; }
        gallery.appendChild(el);
    });
    document.getElementById('project-overlay').classList.add('active');
    document.getElementById('close-btn').style.display = 'block';
    gallery.scrollTop = 0;
}

function closeAll() { document.getElementById('project-overlay').classList.remove('active'); document.getElementById('close-btn').style.display = 'none'; }
run();
</script>
</body>
</html>
